name: astro-build-site
run-name: build Astro site

on:
  # Run when called from another workflow
  workflow_call:

  # Run on manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install packages
        run: npm ci

      - name: Build site
        run: npm run build
        # Output goes to ./dist (Astro default)

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          # Keeps any existing preview subfolder from build-preview
          clean-exclude: preview
          force: false
